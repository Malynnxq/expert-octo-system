<title>Berechenbarkeit – Wissenskarte</title>
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
svg{width:100vw;height:100vh;display:block;cursor:grab;touch-action:none;user-select:none}svg.dragging{cursor:grabbing}
.edge{stroke:#8e8e93;stroke-width:1.35;opacity:.34;fill:none}.relation{stroke:#0071e3;stroke-width:1.35;stroke-dasharray:6 5;opacity:.6;fill:none;marker-end:url(#arrow)}
.relation-label{font-size:11px;fill:#0066cc;paint-order:stroke;stroke:#f5f5f7;stroke-width:5px;stroke-linejoin:round;text-anchor:middle}
.node circle{fill:#fff;stroke:#d1d1d6;stroke-width:1.35}.node.domain circle{fill:#edf6ff;stroke:#69aef5;stroke-width:2}.node.root circle{fill:#1d1d1f;stroke:#1d1d1f}.node text{fill:#1d1d1f;text-anchor:middle;font-size:12px;font-weight:600;pointer-events:none}.node.domain text{font-size:15px;font-weight:700}.node.root text{fill:#fff;font-size:19px;font-weight:750}
.progressive{transition:opacity .25s ease}.hidden-detail{opacity:0;pointer-events:none}.visible-detail{opacity:1}
.legend{position:fixed;left:16px;bottom:16px;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);padding:10px 12px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.08);font-size:12px;color:#48484a;pointer-events:none}.legend div+div{margin-top:5px}.plain,.dash{display:inline-block;width:28px;margin-right:7px;vertical-align:middle;border-top:1.5px solid #8e8e93}.dash{border-top-style:dashed;border-color:#0071e3}
.hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.88);box-shadow:0 8px 30px rgba(0,0,0,.07);font-size:13px;color:#48484a;pointer-events:none;transition:opacity .3s ease}
</style>
</head>
<body>
<svg id="map" viewBox="-1750 -1250 3500 2500" aria-label="Konzeptorientierte Wissenskarte zu Berechenbarkeit">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#0071e3"/></marker></defs>
<g id="viewport"><g id="edges"></g><g id="labels"></g><g id="nodes"></g></g>
</svg>
<div class="hint" id="hint">Hineinzoomen, um Begriffe und Relationen zu entdecken</div>
<div class="legend"><div><span class="plain"></span>Zugehörigkeit / Unterbegriff</div><div><span class="dash"></span>benannte inhaltliche Relation</div></div>
<script>
(()=>{
const svg=document.getElementById('map'),viewport=document.getElementById('viewport'),edgeLayer=document.getElementById('edges'),labelLayer=document.getElementById('labels'),nodeLayer=document.getElementById('nodes'),hint=document.getElementById('hint');
const nodes=[
['root','Berechenbarkeit',0,0,120,'root'],
['fun','Funktionen & Verfahren',-900,-520,92,'domain'],['rep','Darstellung & Mengen',0,-850,92,'domain'],['dec','Entscheidbarkeit & Sprachen',900,-520,92,'domain'],['tm','Turingmaschinen',980,430,96,'domain'],['models','Berechnungsmodelle',300,900,92,'domain'],['limits','Grenzen der Berechenbarkeit',-520,900,92,'domain'],['complexity','Komplexitätstheorie',-1050,320,92,'domain'],
['procedure','Berechnungsverfahren',-1260,-700,50],['algorithm','Algorithmus',-1050,-800,44],['effective','effektives Verfahren',-820,-820,46],['mapping','Abbildung f: A → B',-590,-710,48],['total','totale Funktion',-1260,-470,44],['partial','partielle Funktion',-1050,-390,44],['termination','Terminierung',-820,-430,44],['undefined','undefiniert (⊥)',-590,-430,42],['input','Eingabe',-1370,-590,36],['processing','Verarbeitung',-1200,-590,40],['output','Ausgabe',-1030,-590,36],
['alphabet','endliches Alphabet',-340,-1080,46],['strings','Wörter Σ*',-140,-1100,40],['countable','abzählbare Menge',90,-1090,46],['uncountable','überabzählbare Menge',330,-1040,48],['naturals','ℕ',-20,-930,32],['integers','ℤ',90,-930,32],['rationals','ℚ',200,-930,32],['reals','ℝ',320,-910,32],['powerset','P(ℕ)',430,-910,36],['programs','Programme',-300,-920,40],['encoding','Kodierung',500,-1080,42],
['decisionProblem','Entscheidungsproblem',560,-730,48],['characteristic','charakteristische Funktion',790,-810,56],['decidableSet','entscheidbare Menge',1030,-800,48],['undecidableSet','unentscheidbare Menge',1270,-710,50],['language','formale Sprache',560,-470,46],['decidableLanguage','entscheidbare Sprache',800,-390,48],['semiLanguage','semi-entscheidbare Sprache',1050,-390,54],['type1','Typ-1-Sprache',1260,-450,42],['primes','Primzahlen',1260,-590,40],['primeLanguage','Binärsprache der Primzahlen',1030,-570,56],
['tm7','7-Tupel M=(Z,Σ,Γ,δ,z₀,□,E)',620,200,62],['stateSet','Zustandsmenge Z',450,80,44],['inputAlphabet','Eingabealphabet Σ',600,30,46],['workAlphabet','Arbeitsalphabet Γ',760,30,46],['transition','Übergangsfunktion δ',930,80,48],['startState','Startzustand z₀',1100,160,44],['blank','Blank □',1210,300,38],['finalStates','Endzustände E',1200,470,44],['tape','unendliches Band',690,420,46],['head','Schreib-Lesekopf',860,350,46],['control','endliche Kontrolleinheit',1020,320,50],
['configuration','Konfiguration αzβ',620,590,52],['startConfig','Startkonfiguration z₀x',430,700,50],['stepRelation','Folgerelation ⊢',620,760,46],['closure','Berechnung ⊢*',820,740,44],['moveL','Bewegung L',970,650,38],['moveR','Bewegung R',1090,650,38],['moveN','Bewegung N',1200,650,38],
['acceptedLanguage','akzeptierte Sprache T(M)',1320,520,58],['acceptance','Akzeptanz',1450,360,42],['turingComputable','Turing-berechenbare Funktion',1390,700,60],['stringFunction','Funktion Σ* → Σ*',1510,850,48],['numberFunction','Funktion ℕᵏ → ℕ',1330,900,48],['binaryEncoding','Binärkodierung bin(n)',1160,900,50],['nontermination','Nichtterminierung',1510,1040,46],
['singleTape','Einband-Turingmaschine',680,1050,52],['multiTape','k-Band-Turingmaschine',900,1070,52],['multiTransition','δ auf k gelesenen Symbolen',1110,1090,56],['equivalence','gleiche Berechnungsmächtigkeit',870,1240,62],['simulation','Einband-Simulation',640,1240,50],['universal','universelle Turingmaschine',1260,1150,58],['goedelization','Gödelisierung',1450,1180,44],['programTape','Programmband',1510,1020,44],['workTape','simuliertes Arbeitsband',1320,1010,50],['stateTape','Zustandsband',1140,1010,42],
['composition','Komposition von Turingmaschinen',270,1120,62],['sequence','Nacheinanderschaltung M₁;M₂',60,1240,58],['branch','Verzweigung IF–THEN–ELSE',270,1320,58],['loop','Wiederholung WHILE–DO',490,1260,54],['registerView','Bänder als Register',80,1040,48],
['formal','formaler Berechenbarkeitsbegriff',250,720,62],['intuitive','intuitiver Berechenbarkeitsbegriff',430,820,62],['church','Churchsche These',100,790,52],['registerMachine','Registermaschine',80,930,46],['whileProgram','WHILE-Programme',300,980,46],['gotoProgram','GOTO-Programme',480,970,44],['mu','µ-rekursive Funktionen',460,1090,50],['lambda','λ-definierbare Funktionen',250,1030,50],
['halting','Halteproblem',-760,1080,44],['reduction','Reduzierbarkeit',-550,1170,46],['pcp','Postsches Korrespondenzproblem',-300,1190,60],['goedel','Gödelscher Satz',-90,1100,46],['noncompFun','nicht berechenbare Funktion',-980,900,56],['compReal','berechenbare reelle Zahl',-790,830,52],['noncompReal','nicht berechenbare reelle Zahl',-560,830,56],['semi','semi-entscheidbares Verfahren',-330,900,56],['piPrefix','π-Präfix-Test',-980,1150,42],['piOccurs','Ziffernfolge in π',-110,1240,46],
['classes','Komplexitätsklassen',-1320,170,50],['pnp','P-NP-Problem',-1300,400,44],['npcomplete','NP-Vollständigkeit',-1090,580,48],['graphs','Graphenprobleme',-820,620,44]
].map(([id,title,x,y,r,type='concept'])=>({id,title,x,y,r,type}));
const hierarchy=[
['root','fun'],['root','rep'],['root','dec'],['root','tm'],['root','models'],['root','limits'],['root','complexity'],
['fun','procedure'],['fun','algorithm'],['fun','effective'],['fun','mapping'],['fun','total'],['fun','partial'],['fun','termination'],['fun','undefined'],['procedure','input'],['procedure','processing'],['procedure','output'],
['rep','alphabet'],['rep','strings'],['rep','countable'],['rep','uncountable'],['rep','programs'],['rep','encoding'],['countable','naturals'],['countable','integers'],['countable','rationals'],['uncountable','reals'],['uncountable','powerset'],
['dec','decisionProblem'],['dec','characteristic'],['dec','decidableSet'],['dec','undecidableSet'],['dec','language'],['language','decidableLanguage'],['language','semiLanguage'],['decidableLanguage','type1'],['decidableSet','primes'],['decidableLanguage','primeLanguage'],
['tm','tm7'],['tm','tape'],['tm','head'],['tm','control'],['tm','configuration'],['tm','acceptedLanguage'],['tm','turingComputable'],['tm','singleTape'],['tm','multiTape'],['tm','universal'],
['tm7','stateSet'],['tm7','inputAlphabet'],['tm7','workAlphabet'],['tm7','transition'],['tm7','startState'],['tm7','blank'],['tm7','finalStates'],
['configuration','startConfig'],['configuration','stepRelation'],['configuration','closure'],['transition','moveL'],['transition','moveR'],['transition','moveN'],
['acceptedLanguage','acceptance'],['turingComputable','stringFunction'],['turingComputable','numberFunction'],['numberFunction','binaryEncoding'],['turingComputable','nontermination'],
['multiTape','multiTransition'],['multiTape','equivalence'],['equivalence','simulation'],['singleTape','simulation'],['universal','goedelization'],['universal','programTape'],['universal','workTape'],['universal','stateTape'],
['models','formal'],['models','intuitive'],['models','church'],['models','registerMachine'],['models','whileProgram'],['models','gotoProgram'],['models','mu'],['models','lambda'],['models','composition'],['composition','sequence'],['composition','branch'],['composition','loop'],['composition','registerView'],
['limits','halting'],['limits','reduction'],['limits','pcp'],['limits','goedel'],['limits','noncompFun'],['limits','compReal'],['limits','noncompReal'],['limits','semi'],['limits','piPrefix'],['limits','piOccurs'],
['complexity','classes'],['complexity','pnp'],['complexity','npcomplete'],['complexity','graphs']];
const relations=[
['procedure','mapping','realisiert'],['algorithm','procedure','ist eine Form von'],['effective','algorithm','charakterisiert'],['input','processing','wird verarbeitet durch'],['processing','output','erzeugt'],['total','termination','terminiert immer'],['partial','termination','terminiert nicht zwingend'],['partial','undefined','kann liefern'],
['alphabet','strings','erzeugt'],['strings','countable','ist'],['programs','countable','sind'],['encoding','strings','stellt dar als'],
['decisionProblem','characteristic','wird dargestellt durch'],['characteristic','decidableSet','entscheidet'],['language','characteristic','wird entschieden durch'],['primes','primeLanguage','wird kodiert als'],['primeLanguage','decidableLanguage','ist'],['semiLanguage','acceptedLanguage','wird akzeptiert von'],
['tm7','tape','beschreibt Maschine mit'],['head','tape','liest und schreibt auf'],['control','transition','wendet an'],['transition','configuration','erzeugt nächste'],['startConfig','closure','startet'],['closure','acceptedLanguage','führt bei Akzeptanz zu'],['finalStates','acceptance','definieren'],['acceptedLanguage','semiLanguage','ist im Allgemeinen'],
['turingComputable','closure','wird definiert über'],['stringFunction','turingComputable','ist'],['numberFunction','binaryEncoding','verwendet'],['nontermination','undefined','repräsentiert'],
['multiTape','singleTape','wird simuliert durch'],['simulation','equivalence','beweist'],['multiTape','equivalence','hat'],['singleTape','equivalence','hat'],['universal','tm','simuliert jede kodierte'],['goedelization','universal','ermöglicht'],['programTape','goedelization','enthält'],
['registerView','composition','motiviert'],['sequence','composition','ist Operation von'],['branch','composition','ist Operation von'],['loop','composition','ist Operation von'],['composition','whileProgram','erklärt Ausdruckskraft von'],
['tm','formal','definiert'],['whileProgram','formal','definiert äquivalent'],['gotoProgram','formal','definiert äquivalent'],['mu','formal','definiert äquivalent'],['lambda','formal','definiert äquivalent'],['church','formal','identifiziert mit'],['church','intuitive','identifiziert mit'],
['halting','undecidableSet','ist Beispiel für'],['reduction','undecidableSet','überträgt'],['pcp','undecidableSet','ist'],['goedel','formal','zeigt Grenzen von'],['compReal','algorithm','wird approximiert durch'],['noncompReal','uncountable','existiert wegen'],['piOccurs','semi','führt natürlich zu'],['semi','partial','ist typischerweise'],
['classes','complexity','strukturieren'],['pnp','classes','vergleicht'],['npcomplete','pnp','ist zentral für'],['graphs','npcomplete','liefert Beispiele für']];
const byId=new Map(nodes.map(n=>[n.id,n]));
function el(name,attrs={}){const e=document.createElementNS('http://www.w3.org/2000/svg',name);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function lineBetween(a,b,cls){const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;return el('line',{x1:a.x+dx/d*a.r,y1:a.y+dy/d*a.r,x2:b.x-dx/d*b.r,y2:b.y-dy/d*b.r,class:cls+' progressive'})}
const hierarchyEls=[];hierarchy.forEach(([a,b])=>{const line=lineBetween(byId.get(a),byId.get(b),'edge');const structural=byId.get(a).type==='root';if(!structural)line.classList.add('hidden-detail');hierarchyEls.push({el:line,structural});edgeLayer.appendChild(line)});
const relationEls=[];relations.forEach(([a,b,label])=>{const A=byId.get(a),B=byId.get(b),line=lineBetween(A,B,'relation');line.classList.add('hidden-detail');edgeLayer.appendChild(line);const t=el('text',{x:(A.x+B.x)/2,y:(A.y+B.y)/2-7,class:'relation-label progressive hidden-detail'});t.textContent=label;labelLayer.appendChild(t);relationEls.push({line,label:t})});
function wrap(title,max=18){const words=title.split(/\s+/),lines=[];let line='';for(const w of words){const next=line?line+' '+w:w;if(next.length>max&&line){lines.push(line);line=w}else line=next}if(line)lines.push(line);return lines.slice(0,4)}
const conceptEls=[];nodes.forEach(n=>{const g=el('g',{class:'node '+n.type+' progressive',transform:`translate(${n.x} ${n.y})`});if(n.type==='concept')g.classList.add('hidden-detail');g.appendChild(el('circle',{r:n.r}));const lines=wrap(n.title,n.type==='root'?22:n.type==='domain'?19:17),lh=n.type==='root'?22:n.type==='domain'?18:15;lines.forEach((s,i)=>{const t=el('text',{x:0,y:(i-(lines.length-1)/2)*lh+4});t.textContent=s;g.appendChild(t)});nodeLayer.appendChild(g);if(n.type==='concept')conceptEls.push(g)});
let scale=1,tx=0,ty=0,drag=false,lastX=0,lastY=0,pointer=null;
function setVisible(el,visible){el.classList.toggle('hidden-detail',!visible);el.classList.toggle('visible-detail',visible)}
function updateVisibility(){const showConcepts=scale>=1.3,showRelations=scale>=2.0,showLabels=scale>=2.5;conceptEls.forEach(el=>setVisible(el,showConcepts));hierarchyEls.forEach(item=>{if(!item.structural)setVisible(item.el,showConcepts)});relationEls.forEach(item=>{setVisible(item.line,showRelations);setVisible(item.label,showLabels)});hint.style.opacity=scale<1.3?'1':'0'}
function apply(){viewport.setAttribute('transform',`translate(${tx} ${ty}) scale(${scale})`);updateVisibility()}
svg.addEventListener('wheel',e=>{e.preventDefault();const rect=svg.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top,f=Math.exp(-e.deltaY*.0012),ns=Math.max(.55,Math.min(10,scale*f));tx=px-(px-tx)*ns/scale;ty=py-(py-ty)*ns/scale;scale=ns;apply()},{passive:false});
svg.addEventListener('pointerdown',e=>{if(e.button!==0)return;drag=true;pointer=e.pointerId;lastX=e.clientX;lastY=e.clientY;svg.classList.add('dragging');svg.setPointerCapture(pointer)});
svg.addEventListener('pointermove',e=>{if(!drag||e.pointerId!==pointer)return;tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;apply()});
function stop(e){if(!drag)return;drag=false;svg.classList.remove('dragging');if(svg.hasPointerCapture(e.pointerId))svg.releasePointerCapture(e.pointerId)}svg.addEventListener('pointerup',stop);svg.addEventListener('pointercancel',stop);updateVisibility();
})();
</script>
