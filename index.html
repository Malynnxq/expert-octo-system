function placeRelationLabels(){const placed=[];const rectOverlap=(a,b)=>Math.max(0,Math.min(a.x2,b.x2)-Math.max(a.x1,b.x1))*Math.max(0,Math.min(a.y2,b.y2)-Math.max(a.y1,b.y1));const circleRectOverlap=(n,r)=>{const cx=Math.max(r.x1,Math.min(n.x,r.x2)),cy=Math.max(r.y1,Math.min(n.y,r.y2));const dx=n.x-cx,dy=n.y-cy,rr=n.r+18;return dx*dx+dy*dy<rr*rr};for(const item of rEls){const{A,B,q}=item,dx=B.x-A.x,dy=B.y-A.y,len=Math.hypot(dx,dy)||1,nx=-dy/len,ny=dx/len,w=Math.max(52,q.getComputedTextLength()+24),h=30;let best=null;const along=[.5,.4,.6,.32,.68,.24,.76,.18,.82],offsets=[0,22,-22,40,-40,60,-60,84,-84,112,-112,144,-144];for(const t of along)for(const off of offsets){const x=A.x+dx*t+nx*off,y=A.y+dy*t+ny*off,r={x1:x-w/2,x2:x+w/2,y1:y-h/2,y2:y+h/2};let score=Math.abs(t-.5)*140+Math.abs(off)*.35;for(const n of nodes)if(circleRectOverlap(n,r))score+=250000;for(const p of placed){const area=rectOverlap(r,p);if(area)score+=100000+area*20;const gx=Math.max(0,Math.max(p.x1-r.x2,r.x1-p.x2)),gy=Math.max(0,Math.max(p.y1-r.y2,r.y1-p.y2)),gap=Math.hypot(gx,gy);if(gap<18)score+=(18-gap)*160}if(!best||score<best.score)best={x,y,r,score}}q.setAttribute('x',best.x);q.setAttribute('y',best.y+4);placed.push(best.r)}}placeRelationLabels();
