<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>Berechenbarkeit – Wissenskarte</title>
<style>
  *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
  svg{width:100vw;height:100vh;display:block;cursor:grab;touch-action:none;user-select:none}svg.dragging{cursor:grabbing}
  .edge{stroke:#8e8e93;stroke-width:1.4;opacity:.38;fill:none}.relation{stroke:#0071e3;stroke-width:1.4;stroke-dasharray:6 5;opacity:.62;fill:none;marker-end:url(#arrow)}
  .relation-label{font-size:12px;fill:#0066cc;paint-order:stroke;stroke:#f5f5f7;stroke-width:5px;stroke-linejoin:round;text-anchor:middle}
  .node circle{fill:#fff;stroke:#d1d1d6;stroke-width:1.4}.node.domain circle{fill:#edf6ff;stroke:#69aef5;stroke-width:2}.node.root circle{fill:#1d1d1f;stroke:#1d1d1f}.node text{fill:#1d1d1f;text-anchor:middle;font-size:13px;font-weight:600;pointer-events:none}.node.domain text{font-size:16px;font-weight:700}.node.root text{fill:#fff;font-size:20px;font-weight:750}
  .progressive{transition:opacity .28s ease}.hidden-detail{opacity:0;pointer-events:none}.visible-detail{opacity:1}
  .legend{position:fixed;left:16px;bottom:16px;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);padding:10px 12px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.08);font-size:12px;color:#48484a;pointer-events:none}.legend div+div{margin-top:5px}.plain,.dash{display:inline-block;width:28px;margin-right:7px;vertical-align:middle;border-top:1.5px solid #8e8e93}.dash{border-top-style:dashed;border-color:#0071e3}
  .hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.86);box-shadow:0 8px 30px rgba(0,0,0,.07);font-size:13px;color:#48484a;pointer-events:none;transition:opacity .3s ease}
</style>
</head>
<body>
<svg id="map" viewBox="-1500 -1050 3000 2100" aria-label="Konzeptorientierte Wissenskarte zu Berechenbarkeit">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#0071e3"/></marker></defs>
<g id="viewport"><g id="edges"></g><g id="labels"></g><g id="nodes"></g></g>
</svg>
<div class="hint" id="hint">Hineinzoomen, um Begriffe und Relationen zu entdecken</div>
<div class="legend"><div><span class="plain"></span>Zugehörigkeit / Unterbegriff</div><div><span class="dash"></span>benannte inhaltliche Relation</div></div>
<script>
(()=>{
const svg=document.getElementById('map'),viewport=document.getElementById('viewport'),edgeLayer=document.getElementById('edges'),labelLayer=document.getElementById('labels'),nodeLayer=document.getElementById('nodes'),hint=document.getElementById('hint');
const nodes=[
['root','Berechenbarkeit',0,0,120,'root'],
['fun','Funktionen & Verfahren',-720,-420,92,'domain'],['rep','Darstellung & Mengen',0,-650,92,'domain'],['dec','Entscheidbarkeit & Sprachen',720,-420,92,'domain'],['mod','Formale Modelle',720,420,92,'domain'],['lim','Grenzen der Berechenbarkeit',0,650,92,'domain'],['cmp','Komplexitätstheorie',-720,420,92,'domain'],
['procedure','Berechnungsverfahren',-1010,-620,52],['algorithm','Algorithmus',-820,-700,46],['effective','effektives Verfahren',-620,-700,48],['mapping','Abbildung f: A → B',-430,-610,48],['total','totale Funktion',-1010,-390,46],['partial','partielle Funktion',-820,-330,46],['termination','Terminierung',-620,-360,46],['undefined','undefiniert (⊥)',-430,-370,44],['input','Eingabe',-1080,-500,38],['processing','Verarbeitung',-920,-500,42],['output','Ausgabe',-760,-500,38],
['alphabet','endliches Alphabet',-300,-850,48],['strings','Wörter Σ*',-120,-880,42],['countable','abzählbare Menge',100,-880,48],['uncountable','überabzählbare Menge',310,-830,50],['naturals','ℕ',-30,-720,34],['integers','ℤ',80,-720,34],['rationals','ℚ',190,-720,34],['reals','ℝ',300,-700,34],['powerset','P(ℕ)',410,-700,38],['programs','Programme',-250,-710,42],
['decisionProblem','Entscheidungsproblem',430,-620,50],['characteristic','charakteristische Funktion',620,-700,58],['decidableSet','entscheidbare Menge',820,-690,50],['undecidableSet','unentscheidbare Menge',1040,-610,52],['language','formale Sprache',440,-380,48],['decidableLanguage','entscheidbare Sprache',650,-330,50],['type1','Typ-1-Sprache',850,-360,44],['primes','Primzahlen',1030,-420,42],['primeLanguage','Binärsprache der Primzahlen',900,-520,58],
['turing','Turingmaschine',430,250,46],['multitape','Mehrband-Turingmaschine',410,430,54],['register','Registermaschine',570,580,48],['while','WHILE-Programme',760,650,48],['goto','GOTO-Programme',930,560,46],['mu','µ-rekursive Funktionen',1040,390,52],['general','allgemein rekursive Funktionen',980,210,62],['lambda','λ-definierbare Funktionen',820,140,54],['formal','formaler Berechenbarkeitsbegriff',610,260,64],['intuitive','intuitiver Berechenbarkeitsbegriff',610,480,64],['church','Churchsche These',800,360,54],
['halting','Halteproblem',-230,850,46],['reduction','Reduzierbarkeit',-50,910,48],['pcp','Postsches Korrespondenzproblem',160,900,62],['goedel','Gödelscher Satz',340,820,48],['noncompFun','nicht berechenbare Funktion',-420,700,58],['compReal','berechenbare reelle Zahl',-170,650,54],['noncompReal','nicht berechenbare reelle Zahl',100,700,58],['semi','semi-entscheidbares Verfahren',300,650,58],['piPrefix','π-Präfix-Test',-350,920,44],['piOccurs','Ziffernfolge in π',420,940,48],
['classes','Komplexitätsklassen',-1030,250,52],['pnp','P-NP-Problem',-1030,470,46],['npcomplete','NP-Vollständigkeit',-850,620,50],['graphs','Graphenprobleme',-620,650,46]
].map(([id,title,x,y,r,type='concept'])=>({id,title,x,y,r,type}));
const hierarchy=[
['root','fun'],['root','rep'],['root','dec'],['root','mod'],['root','lim'],['root','cmp'],
['fun','procedure'],['fun','algorithm'],['fun','effective'],['fun','mapping'],['fun','total'],['fun','partial'],['fun','termination'],['fun','undefined'],['procedure','input'],['procedure','processing'],['procedure','output'],
['rep','alphabet'],['rep','strings'],['rep','countable'],['rep','uncountable'],['rep','programs'],['countable','naturals'],['countable','integers'],['countable','rationals'],['uncountable','reals'],['uncountable','powerset'],
['dec','decisionProblem'],['dec','characteristic'],['dec','decidableSet'],['dec','undecidableSet'],['dec','language'],['language','decidableLanguage'],['decidableLanguage','type1'],['decidableSet','primes'],['decidableLanguage','primeLanguage'],
['mod','turing'],['mod','multitape'],['mod','register'],['mod','while'],['mod','goto'],['mod','mu'],['mod','general'],['mod','lambda'],['mod','formal'],['mod','intuitive'],['mod','church'],
['lim','halting'],['lim','reduction'],['lim','pcp'],['lim','goedel'],['lim','noncompFun'],['lim','compReal'],['lim','noncompReal'],['lim','semi'],['lim','piPrefix'],['lim','piOccurs'],
['cmp','classes'],['cmp','pnp'],['cmp','npcomplete'],['cmp','graphs']];
const relations=[
['procedure','mapping','realisiert'],['algorithm','procedure','ist eine Form von'],['effective','algorithm','charakterisiert'],['input','processing','wird verarbeitet durch'],['processing','output','erzeugt'],['total','termination','terminiert immer'],['partial','termination','terminiert nicht zwingend'],['partial','undefined','kann liefern'],
['alphabet','strings','erzeugt'],['strings','countable','ist'],['programs','countable','sind'],['programs','noncompFun','reichen nicht für alle'],
['decisionProblem','characteristic','wird dargestellt durch'],['characteristic','decidableSet','entscheidet'],['language','characteristic','wird entschieden durch'],['primes','primeLanguage','wird kodiert als'],['primeLanguage','decidableLanguage','ist'],['type1','decidableLanguage','ist'],
['turing','formal','definiert'],['while','formal','definiert äquivalent'],['goto','formal','definiert äquivalent'],['mu','formal','definiert äquivalent'],['lambda','formal','definiert äquivalent'],['church','formal','identifiziert mit'],['church','intuitive','identifiziert mit'],
['halting','undecidableSet','ist Beispiel für'],['reduction','undecidableSet','überträgt'],['pcp','undecidableSet','ist'],['goedel','formal','zeigt Grenzen von'],['compReal','algorithm','wird approximiert durch'],['noncompReal','uncountable','existiert wegen'],['piOccurs','semi','führt natürlich zu'],['semi','partial','ist typischerweise'],
['classes','cmp','strukturieren'],['pnp','classes','vergleicht'],['npcomplete','pnp','ist zentral für'],['graphs','npcomplete','liefert Beispiele für']];
const byId=new Map(nodes.map(n=>[n.id,n]));
function el(name,attrs={}){const e=document.createElementNS('http://www.w3.org/2000/svg',name);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function lineBetween(a,b,cls){const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;return el('line',{x1:a.x+dx/d*a.r,y1:a.y+dy/d*a.r,x2:b.x-dx/d*b.r,y2:b.y-dy/d*b.r,class:cls+' progressive'})}
const hierarchyEls=[];hierarchy.forEach(([a,b])=>{const line=lineBetween(byId.get(a),byId.get(b),'edge');const structural=byId.get(a).type==='root';if(!structural)line.classList.add('hidden-detail');hierarchyEls.push({el:line,structural});edgeLayer.appendChild(line)});
const relationEls=[];relations.forEach(([a,b,label])=>{const A=byId.get(a),B=byId.get(b),line=lineBetween(A,B,'relation');line.classList.add('hidden-detail');edgeLayer.appendChild(line);const t=el('text',{x:(A.x+B.x)/2,y:(A.y+B.y)/2-8,class:'relation-label progressive hidden-detail'});t.textContent=label;labelLayer.appendChild(t);relationEls.push({line,label:t})});
function wrap(title,max=18){const words=title.split(/\s+/),lines=[];let line='';for(const w of words){const next=line?line+' '+w:w;if(next.length>max&&line){lines.push(line);line=w}else line=next}if(line)lines.push(line);return lines.slice(0,4)}
const conceptEls=[];nodes.forEach(n=>{const g=el('g',{class:'node '+n.type+' progressive',transform:`translate(${n.x} ${n.y})`});if(n.type==='concept')g.classList.add('hidden-detail');g.appendChild(el('circle',{r:n.r}));const lines=wrap(n.title,n.type==='root'?22:n.type==='domain'?19:17),lh=n.type==='root'?23:n.type==='domain'?19:16;lines.forEach((s,i)=>{const t=el('text',{x:0,y:(i-(lines.length-1)/2)*lh+5});t.textContent=s;g.appendChild(t)});nodeLayer.appendChild(g);if(n.type==='concept')conceptEls.push(g)});
let scale=1,tx=0,ty=0,drag=false,lastX=0,lastY=0,pointer=null;
function setVisible(el,visible){el.classList.toggle('hidden-detail',!visible);el.classList.toggle('visible-detail',visible)}
function updateVisibility(){const showConcepts=scale>=1.35,showRelations=scale>=2.15,showLabels=scale>=2.65;conceptEls.forEach(el=>setVisible(el,showConcepts));hierarchyEls.forEach(item=>{if(!item.structural)setVisible(item.el,showConcepts)});relationEls.forEach(item=>{setVisible(item.line,showRelations);setVisible(item.label,showLabels)});hint.style.opacity=scale<1.35?'1':'0'}
function apply(){viewport.setAttribute('transform',`translate(${tx} ${ty}) scale(${scale})`);updateVisibility()}
svg.addEventListener('wheel',e=>{e.preventDefault();const rect=svg.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top,f=Math.exp(-e.deltaY*.0012),ns=Math.max(.6,Math.min(8,scale*f));tx=px-(px-tx)*ns/scale;ty=py-(py-ty)*ns/scale;scale=ns;apply()},{passive:false});
svg.addEventListener('pointerdown',e=>{if(e.button!==0)return;drag=true;pointer=e.pointerId;lastX=e.clientX;lastY=e.clientY;svg.classList.add('dragging');svg.setPointerCapture(pointer)});
svg.addEventListener('pointermove',e=>{if(!drag||e.pointerId!==pointer)return;tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;apply()});
function stop(e){if(!drag)return;drag=false;svg.classList.remove('dragging');if(svg.hasPointerCapture(e.pointerId))svg.releasePointerCapture(e.pointerId)}svg.addEventListener('pointerup',stop);svg.addEventListener('pointercancel',stop);updateVisibility();
})();
</script>
</body>
</html>
