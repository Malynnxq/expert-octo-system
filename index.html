<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Map Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Learning Map</h1>
        <p>Navigate concepts, open doors, and turn any region into active study.</p>
      </div>
      <div class="topbar-actions">
        <button id="resetProgressBtn" class="secondary">Reset progress</button>
      </div>
    </header>

    <main class="workspace">
      <section class="map-panel">
        <div class="panel-heading">
          <div>
            <h2>Interactive Computer Graphics</h2>
            <p>Click a node to focus it. Drag the map and use the mouse wheel to zoom.</p>
          </div>
          <div class="zoom-controls">
            <button id="zoomOutBtn" aria-label="Zoom out">−</button>
            <button id="resetViewBtn">Reset view</button>
            <button id="zoomInBtn" aria-label="Zoom in">+</button>
          </div>
        </div>

        <div id="mapViewport" class="map-viewport" tabindex="0">
          <svg id="mapSvg" aria-label="Concept map"></svg>
        </div>
      </section>

      <aside class="study-panel">
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">↗</div>
          <h2>Choose a concept</h2>
          <p>The concept becomes a doorway into explanation, recall, connections, and practice.</p>
        </div>

        <div id="conceptView" class="concept-view hidden">
          <div class="concept-header">
            <div>
              <div id="conceptPath" class="concept-path"></div>
              <h2 id="conceptTitle"></h2>
            </div>
            <button id="markKnownBtn" class="secondary">Mark as learned</button>
          </div>

          <div class="tabs" role="tablist">
            <button class="tab active" data-mode="read">Read</button>
            <button class="tab" data-mode="recall">Recall</button>
            <button class="tab" data-mode="apply">Apply</button>
            <button class="tab" data-mode="connections">Connections</button>
          </div>

          <div id="modeContent" class="mode-content"></div>
        </div>
      </aside>
    </main>
  </div>

  <template id="readTemplate">
    <article class="study-card">
      <h3>Why this matters</h3>
      <p data-field="why"></p>
    </article>
    <article class="study-card">
      <h3>Core explanation</h3>
      <p data-field="explanation"></p>
    </article>
    <article class="study-card">
      <h3>Formal anchor</h3>
      <p data-field="formal"></p>
    </article>
    <article class="study-card">
      <h3>Typical mistake</h3>
      <p data-field="mistake"></p>
    </article>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
