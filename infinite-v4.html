<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Infinite Learning Map</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f5f5f7;
    }
    body {
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }
    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #map.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <canvas id="map" aria-label="Continuously zoomable predefined learning map"></canvas>
  <script>
  (() => {
    "use strict";

    const tree = {
      id: "graphics", title: "Interactive Computer Graphics", subtitle: "course", children: [
        { id: "geometry", title: "Geometry", subtitle: "what exists?", children: [
          { id: "meshes", title: "Meshes", subtitle: "surface structure", children: [
            { id: "vertices", title: "Vertices", subtitle: "positions", children: [] },
            { id: "edges", title: "Edges", subtitle: "connectivity", children: [] },
            { id: "faces", title: "Faces", subtitle: "surface pieces", children: [] },
            { id: "topology", title: "Topology", subtitle: "neighbourhood", children: [] }
          ]},
          { id: "buffers", title: "Buffers", subtitle: "GPU data", children: [
            { id: "vertex-buffer", title: "Vertex Buffer", subtitle: "attributes", children: [] },
            { id: "index-buffer", title: "Index Buffer", subtitle: "reuse", children: [] },
            { id: "framebuffer", title: "Framebuffer", subtitle: "outputs", children: [] }
          ]},
          { id: "normals", title: "Normals", subtitle: "orientation", children: [
            { id: "face-normals", title: "Face Normals", subtitle: "flat", children: [] },
            { id: "vertex-normals", title: "Vertex Normals", subtitle: "smooth", children: [] },
            { id: "normal-matrix", title: "Normal Matrix", subtitle: "inverse transpose", children: [] }
          ]}
        ]},
        { id: "transformations", title: "Transformations", subtitle: "where is it?", children: [
          { id: "coordinate-spaces", title: "Coordinate Spaces", subtitle: "nested systems", children: [
            { id: "object-space", title: "Object Space", subtitle: "local", children: [] },
            { id: "world-space", title: "World Space", subtitle: "scene", children: [] },
            { id: "view-space", title: "View Space", subtitle: "camera", children: [] },
            { id: "clip-space", title: "Clip Space", subtitle: "projection", children: [] },
            { id: "screen-space", title: "Screen Space", subtitle: "pixels", children: [] }
          ]},
          { id: "model-transform", title: "Model Transform", subtitle: "object to world", children: [
            { id: "translation", title: "Translation", subtitle: "move", children: [] },
            { id: "rotation", title: "Rotation", subtitle: "turn", children: [] },
            { id: "scaling", title: "Scaling", subtitle: "resize", children: [] },
            { id: "matrix-order", title: "Matrix Order", subtitle: "composition", children: [] }
          ]},
          { id: "camera-projection", title: "Camera & Projection", subtitle: "world to image", children: [
            { id: "view-matrix", title: "View Matrix", subtitle: "inverse camera", children: [] },
            { id: "perspective", title: "Perspective", subtitle: "depth scale", children: [] },
            { id: "orthographic", title: "Orthographic", subtitle: "parallel", children: [] },
            { id: "perspective-division", title: "Perspective Division", subtitle: "divide by w", children: [] }
          ]}
        ]},
        { id: "visibility", title: "Visibility", subtitle: "what can be seen?", children: [
          { id: "clipping", title: "Clipping", subtitle: "view volume", children: [
            { id: "clip-space-test", title: "Clip-Space Test", subtitle: "boundaries", children: [] },
            { id: "near-plane", title: "Near Plane", subtitle: "front limit", children: [] },
            { id: "far-plane", title: "Far Plane", subtitle: "back limit", children: [] }
          ]},
          { id: "culling", title: "Culling", subtitle: "remove work", children: [
            { id: "back-face-culling", title: "Back-Face Culling", subtitle: "orientation", children: [] },
            { id: "frustum-culling", title: "Frustum Culling", subtitle: "outside view", children: [] }
          ]},
          { id: "depth-buffer", title: "Depth Buffer", subtitle: "nearest surface", children: [
            { id: "depth-test", title: "Depth Test", subtitle: "comparison", children: [] },
            { id: "depth-precision", title: "Depth Precision", subtitle: "distribution", children: [] },
            { id: "z-fighting", title: "Z-Fighting", subtitle: "precision conflict", children: [] }
          ]}
        ]},
        { id: "shading", title: "Shading", subtitle: "what does it look like?", children: [
          { id: "lighting", title: "Lighting", subtitle: "light interaction", children: [
            { id: "diffuse", title: "Diffuse", subtitle: "matte response", children: [] },
            { id: "specular", title: "Specular", subtitle: "highlights", children: [] },
            { id: "ambient", title: "Ambient", subtitle: "background light", children: [] },
            { id: "light-direction", title: "Light Direction", subtitle: "orientation", children: [] }
          ]},
          { id: "materials", title: "Materials", subtitle: "surface response", children: [
            { id: "albedo", title: "Albedo", subtitle: "base colour", children: [] },
            { id: "roughness", title: "Roughness", subtitle: "microstructure", children: [] },
            { id: "metalness", title: "Metalness", subtitle: "conductor", children: [] }
          ]},
          { id: "textures", title: "Textures", subtitle: "sampled detail", children: [
            { id: "uv-coordinates", title: "UV Coordinates", subtitle: "parameterization", children: [] },
            { id: "filtering", title: "Filtering", subtitle: "reconstruction", children: [] },
            { id: "wrapping", title: "Wrapping", subtitle: "outside range", children: [] },
            { id: "mipmaps", title: "Mipmaps", subtitle: "minification", children: [] }
          ]}
        ]},
        { id: "rasterization", title: "Rasterization", subtitle: "which samples?", children: [
          { id: "fragments", title: "Fragments", subtitle: "pixel candidates", children: [
            { id: "fragment-shader", title: "Fragment Shader", subtitle: "per fragment", children: [] },
            { id: "discard", title: "Discard", subtitle: "reject", children: [] },
            { id: "framebuffer-output", title: "Framebuffer Output", subtitle: "write", children: [] }
          ]},
          { id: "coverage", title: "Coverage", subtitle: "inside tests", children: [
            { id: "edge-functions", title: "Edge Functions", subtitle: "half-spaces", children: [] },
            { id: "sample-locations", title: "Sample Locations", subtitle: "measurement", children: [] },
            { id: "anti-aliasing", title: "Anti-Aliasing", subtitle: "smooth edges", children: [] }
          ]},
          { id: "barycentric-coordinates", title: "Barycentric Coordinates", subtitle: "triangle weights", children: [
            { id: "geometric-meaning", title: "Geometric Meaning", subtitle: "weighted position", children: [] },
            { id: "inside-triangle-test", title: "Inside-Triangle Test", subtitle: "signs", children: [] },
            { id: "attribute-weights", title: "Attribute Weights", subtitle: "interpolation", children: [] }
          ]},
          { id: "interpolation", title: "Interpolation", subtitle: "values across surfaces", children: [
            { id: "linear-interpolation", title: "Linear Interpolation", subtitle: "affine", children: [] },
            { id: "perspective-correct", title: "Perspective-Correct", subtitle: "divide by w", children: [] },
            { id: "flat-interpolation", title: "Flat Interpolation", subtitle: "constant", children: [] }
          ]}
        ]},
        { id: "interaction", title: "Interaction", subtitle: "how does the user act?", children: [
          { id: "frame-loop", title: "Frame Loop", subtitle: "continuous update", children: [
            { id: "delta-time", title: "Delta Time", subtitle: "elapsed time", children: [] },
            { id: "update", title: "Update", subtitle: "state", children: [] },
            { id: "render", title: "Render", subtitle: "draw", children: [] },
            { id: "present", title: "Present", subtitle: "display", children: [] }
          ]},
          { id: "input", title: "Input", subtitle: "events and state", children: [
            { id: "keyboard", title: "Keyboard", subtitle: "keys", children: [] },
            { id: "pointer", title: "Pointer", subtitle: "position", children: [] },
            { id: "gamepad", title: "Gamepad", subtitle: "axes and buttons", children: [] }
          ]},
          { id: "picking", title: "Picking", subtitle: "screen to scene", children: [
            { id: "ray-casting", title: "Ray Casting", subtitle: "intersection", children: [] },
            { id: "id-buffer", title: "ID Buffer", subtitle: "encoded object", children: [] },
            { id: "bounding-volumes", title: "Bounding Volumes", subtitle: "acceleration", children: [] }
          ]}
        ]}
      ]
    };

    const FACETS = [
      ["definition", "Definition", "precise meaning"],
      ["intuition", "Intuition", "mental model"],
      ["formal-rule", "Formal Rule", "mathematical anchor"],
      ["worked-example", "Worked Example", "concrete case"],
      ["common-mistake", "Common Mistake", "failure mode"],
      ["practice", "Practice", "active recall"]
    ];

    function addPredefinedFacets(node) {
      if (!node.children.length) {
        node.children = FACETS.map(([suffix, title, subtitle]) => ({
          id: `${node.id}-${suffix}`,
          title,
          subtitle,
          children: []
        }));
        return;
      }
      node.children.forEach(addPredefinedFacets);
    }
    addPredefinedFacets(tree);

    const canvas = document.getElementById("map");
    const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
    const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const DPR_CAP = 2;
    const DEPTH_RATIO = 0.215;
    const nodes = [];
    const edges = [];

    function place(node, depth, x, y, angleSeed = -Math.PI / 2) {
      node.depth = depth;
      node.x = x;
      node.y = y;
      node.phase = hash(node.id) * Math.PI * 2;
      nodes.push(node);

      const count = node.children.length;
      if (!count) return;

      const ring = depth === 0 ? 340 : 118 * Math.pow(DEPTH_RATIO, depth - 1);
      const offset = angleSeed + (depth % 2 ? Math.PI / Math.max(7, count * 2) : 0);
      node.children.forEach((child, index) => {
        const angle = offset + index * Math.PI * 2 / count;
        const cx = x + Math.cos(angle) * ring;
        const cy = y + Math.sin(angle) * ring;
        edges.push({ a: node, b: child });
        place(child, depth + 1, cx, cy, angle + Math.PI * 0.37);
      });
    }

    function hash(text) {
      let value = 2166136261;
      for (let i = 0; i < text.length; i++) {
        value ^= text.charCodeAt(i);
        value = Math.imul(value, 16777619);
      }
      return (value >>> 0) / 4294967295;
    }

    place(tree, 0, 0, 0);

    const camera = {
      scale: 1,
      x: 0,
      y: 0,
      targetScale: 1,
      targetX: 0,
      targetY: 0
    };

    let width = 1;
    let height = 1;
    let dpr = 1;
    let dragging = false;
    let pointerId = null;
    let lastX = 0;
    let lastY = 0;
    let animationFrame = 0;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
      width = Math.max(1, innerWidth);
      height = Math.max(1, innerHeight);
      canvas.width = Math.round(width * dpr);
      canvas.height = Math.round(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      scheduleDraw();
    }

    function worldToScreen(node, now) {
      const amplitude = reduceMotion ? 0 : Math.min(3.2, 1.1 / Math.max(camera.scale, 0.001));
      const driftX = Math.cos(now * 0.00022 + node.phase) * amplitude;
      const driftY = Math.sin(now * 0.00019 + node.phase * 1.13) * amplitude;
      return {
        x: width / 2 + (node.x + driftX - camera.x) * camera.scale,
        y: height / 2 + (node.y + driftY - camera.y) * camera.scale
      };
    }

    function nodeWorldRadius(node) {
      if (node.depth === 0) return 88;
      if (node.depth === 1) return 62;
      return 62 * Math.pow(DEPTH_RATIO, node.depth - 1);
    }

    function visibilityFor(projectedRadius) {
      const appear = smoothstep(7, 24, projectedRadius);
      const disappear = 1 - smoothstep(260, 720, projectedRadius);
      return Math.max(0, Math.min(1, appear * disappear));
    }

    function smoothstep(a, b, value) {
      const t = Math.max(0, Math.min(1, (value - a) / (b - a)));
      return t * t * (3 - 2 * t);
    }

    function draw() {
      animationFrame = 0;
      const now = performance.now();
      const easing = dragging ? 1 : 0.28;
      camera.scale += (camera.targetScale - camera.scale) * easing;
      camera.x += (camera.targetX - camera.x) * easing;
      camera.y += (camera.targetY - camera.y) * easing;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = "#f5f5f7";
      ctx.fillRect(0, 0, width, height);

      const glow = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, Math.max(width, height) * 0.56);
      glow.addColorStop(0, "rgba(0,113,227,0.055)");
      glow.addColorStop(1, "rgba(0,113,227,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      const screen = new Map();
      for (const node of nodes) screen.set(node, worldToScreen(node, now));

      ctx.lineCap = "round";
      for (const edge of edges) {
        const a = screen.get(edge.a);
        const b = screen.get(edge.b);
        const rb = nodeWorldRadius(edge.b) * camera.scale;
        const alpha = visibilityFor(rb) * 0.18;
        if (alpha < 0.008) continue;
        if (!inExtendedView(a) && !inExtendedView(b)) continue;
        ctx.strokeStyle = `rgba(29,29,31,${alpha})`;
        ctx.lineWidth = Math.max(0.65, Math.min(2.2, rb * 0.035));
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      const visibleNodes = [];
      for (const node of nodes) {
        const point = screen.get(node);
        const radius = nodeWorldRadius(node) * camera.scale;
        const alpha = visibilityFor(radius);
        if (alpha < 0.01 || !inExtendedView(point, radius)) continue;
        visibleNodes.push({ node, point, radius, alpha });
      }
      visibleNodes.sort((a, b) => a.radius - b.radius);

      for (const item of visibleNodes) drawNode(item);

      if (!dragging && (!reduceMotion || Math.abs(camera.targetScale - camera.scale) > 0.0001)) {
        scheduleDraw();
      }
    }

    function inExtendedView(point, radius = 0) {
      const margin = Math.min(900, Math.max(180, radius * 1.5));
      return point.x + radius > -margin && point.x - radius < width + margin && point.y + radius > -margin && point.y - radius < height + margin;
    }

    function drawNode({ node, point, radius, alpha }) {
      const r = Math.max(1, radius);
      ctx.save();
      ctx.globalAlpha = alpha;

      const isRoot = node.depth === 0;
      ctx.beginPath();
      ctx.arc(point.x, point.y, r, 0, Math.PI * 2);
      ctx.fillStyle = isRoot ? "#1d1d1f" : "rgba(255,255,255,0.97)";
      ctx.fill();
      ctx.lineWidth = Math.max(0.8, Math.min(2.2, r * 0.028));
      ctx.strokeStyle = isRoot ? "#1d1d1f" : "rgba(29,29,31,0.12)";
      ctx.stroke();

      if (r > 13) {
        const fontSize = Math.max(9, Math.min(18, r * 0.24));
        ctx.fillStyle = isRoot ? "#ffffff" : "#1d1d1f";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `650 ${fontSize}px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif`;
        const lines = wrapText(node.title, r * 1.55, fontSize);
        const lineHeight = fontSize * 1.05;
        const startY = point.y - (lines.length - 1) * lineHeight / 2 - (r > 34 ? fontSize * 0.18 : 0);
        lines.slice(0, 3).forEach((line, index) => ctx.fillText(line, point.x, startY + index * lineHeight));

        if (r > 37 && node.subtitle) {
          const subSize = Math.max(8, Math.min(12, r * 0.14));
          ctx.font = `500 ${subSize}px -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif`;
          ctx.fillStyle = isRoot ? "rgba(255,255,255,0.62)" : "#6e6e73";
          ctx.fillText(node.subtitle, point.x, point.y + r * 0.48);
        }
      }

      ctx.restore();
    }

    function wrapText(text, maxWidth, fontSize) {
      const words = text.split(/\s+/);
      const lines = [];
      let line = "";
      for (const word of words) {
        const next = line ? `${line} ${word}` : word;
        if (ctx.measureText(next).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = next;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function zoomAt(clientX, clientY, deltaY) {
      const rect = canvas.getBoundingClientRect();
      const px = clientX - rect.left - width / 2;
      const py = clientY - rect.top - height / 2;
      const oldScale = camera.targetScale;
      const factor = Math.exp(-deltaY * 0.0038);
      const newScale = Math.max(0.06, Math.min(1e12, oldScale * factor));
      const worldX = camera.targetX + px / oldScale;
      const worldY = camera.targetY + py / oldScale;

      camera.targetScale = newScale;
      camera.targetX = worldX - px / newScale;
      camera.targetY = worldY - py / newScale;
      scheduleDraw();
    }

    canvas.addEventListener("wheel", event => {
      event.preventDefault();
      zoomAt(event.clientX, event.clientY, event.deltaY);
    }, { passive: false });

    canvas.addEventListener("pointerdown", event => {
      if (event.button !== 0) return;
      dragging = true;
      pointerId = event.pointerId;
      lastX = event.clientX;
      lastY = event.clientY;
      camera.x = camera.targetX;
      camera.y = camera.targetY;
      camera.scale = camera.targetScale;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(pointerId);
      scheduleDraw();
    });

    canvas.addEventListener("pointermove", event => {
      if (!dragging || event.pointerId !== pointerId) return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      camera.targetX -= dx / camera.targetScale;
      camera.targetY -= dy / camera.targetScale;
      camera.x = camera.targetX;
      camera.y = camera.targetY;
      scheduleDraw();
    });

    function endDrag(event) {
      if (!dragging || event.pointerId !== pointerId) return;
      dragging = false;
      canvas.classList.remove("dragging");
      if (canvas.hasPointerCapture(pointerId)) canvas.releasePointerCapture(pointerId);
      pointerId = null;
      scheduleDraw();
    }

    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    window.addEventListener("resize", resize, { passive: true });

    function scheduleDraw() {
      if (!animationFrame) animationFrame = requestAnimationFrame(draw);
    }

    resize();
    scheduleDraw();
  })();
  </script>
</body>
</html>
