<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Infinite Learning Map</title>
  <style>
    html, body, iframe {
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      overflow: hidden;
      display: block;
      background: #f5f5f7;
    }
  </style>
</head>
<body>
  <iframe id="mapFrame" src="infinite-v4.html?v=20260719-2" title="Infinite learning map"></iframe>
  <script>
    (() => {
      const frame = document.getElementById('mapFrame');
      frame.addEventListener('load', () => {
        const win = frame.contentWindow;
        const proto = win.CanvasRenderingContext2D && win.CanvasRenderingContext2D.prototype;
        if (!proto || proto.__subtitlesRemoved) return;

        const originalFillText = proto.fillText;
        proto.fillText = function(text, x, y, maxWidth) {
          const font = String(this.font || '');
          if (/^500\s/.test(font)) return;
          return maxWidth === undefined
            ? originalFillText.call(this, text, x, y)
            : originalFillText.call(this, text, x, y, maxWidth);
        };
        proto.__subtitlesRemoved = true;
        win.dispatchEvent(new win.Event('resize'));
      });
    })();
  </script>
</body>
</html>
